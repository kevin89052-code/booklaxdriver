<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>车队下单系统</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #15171a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0b6bcb;
      --accent-dark: #084f96;
      --success: #0b7a48;
      --warn: #a15c00;
      --shadow: 0 16px 50px rgba(20, 35, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
    }

    .main {
      padding: 32px;
    }

    .sidebar {
      min-height: 100vh;
      padding: 32px 24px;
      background: #111827;
      color: #fff;
      position: sticky;
      top: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--accent);
      font-weight: 800;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 4px;
      font-size: 28px;
      letter-spacing: 0;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 1px 2px rgba(20, 35, 55, 0.04);
    }

    .section.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #293241;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cfd6e1;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 12px 13px;
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11, 107, 203, 0.14);
    }

    .field {
      margin-bottom: 16px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .vehicle-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .vehicle-card {
      border: 1px solid #cfd6e1;
      border-radius: 8px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
    }

    .vehicle-card input {
      width: auto;
      margin-right: 8px;
    }

    .vehicle-card strong {
      display: block;
      margin-bottom: 5px;
    }

    .vehicle-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .vehicle-card:has(input:checked) {
      border-color: var(--accent);
      background: #edf6ff;
    }

    .summary {
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .price {
      display: flex;
      justify-content: space-between;
      align-items: end;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 16px;
      margin-bottom: 16px;
    }

    .price strong {
      font-size: 34px;
      line-height: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      background: #e8f5ee;
      color: var(--success);
      font-weight: 700;
      font-size: 13px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eef0f4;
    }

    .summary-row span:first-child {
      color: var(--muted);
    }

    .summary-row span:last-child {
      text-align: right;
      font-weight: 700;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button,
    .button-link {
      border: 0;
      border-radius: 8px;
      padding: 13px 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    button:hover,
    .button-link:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: #eef2f7;
      color: #172033;
    }

    .secondary:hover {
      background: #dfe6ef;
    }

    .notice {
      margin-top: 14px;
      color: #d5dce8;
      font-size: 13px;
    }

    .order-text {
      width: 100%;
      min-height: 190px;
      margin-top: 14px;
      border: 1px solid #303b4f;
      background: #0b1220;
      color: #fff;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      resize: vertical;
    }

    .status {
      display: none;
      margin-top: 10px;
      color: var(--success);
      font-weight: 700;
    }

    .status.show {
      display: block;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        position: static;
      }
    }

    @media (max-width: 720px) {
      .main,
      .sidebar {
        padding: 20px;
      }

      .grid,
      .vehicle-options {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="topbar">
        <div class="brand">
          <div class="logo">车</div>
          <div>
            <h1>车队快速下单系统</h1>
            <p class="sub">客户填写信息后，你可以立即复制订单或发到 WhatsApp。</p>
          </div>
        </div>
        <span class="badge">实时估价</span>
      </div>

      <form id="orderForm" class="grid">
        <section class="section full">
          <h2>选择车型</h2>
          <div class="vehicle-options">
            <label class="vehicle-card">
              <input type="radio" name="vehicle" value="经济轿车" data-base="45" data-mile="2.2" checked>
              <strong>经济轿车</strong>
              <span>1-3 位乘客，机场接送/短途</span>
            </label>
            <label class="vehicle-card">
              <input type="radio" name="vehicle" value="商务 SUV" data-base="75" data-mile="3.2">
              <strong>商务 SUV</strong>
              <span>1-6 位乘客，商务/家庭出行</span>
            </label>
            <label class="vehicle-card">
              <input type="radio" name="vehicle" value="豪华 Van" data-base="120" data-mile="4.4">
              <strong>豪华 Van</strong>
              <span>团队、活动、长途包车</span>
            </label>
          </div>
        </section>

        <section class="section">
          <h2>行程信息</h2>
          <div class="field">
            <label for="serviceType">服务类型</label>
            <select id="serviceType">
              <option>机场接送</option>
              <option>点到点接送</option>
              <option>小时包车</option>
              <option>商务接待</option>
              <option>活动/婚礼用车</option>
            </select>
          </div>
          <div class="field">
            <label for="pickup">上车地址</label>
            <input id="pickup" placeholder="例如：Denver Airport">
          </div>
          <div class="field">
            <label for="dropoff">下车地址</label>
            <input id="dropoff" placeholder="例如：Downtown Denver Hotel">
          </div>
          <div class="field">
            <label for="distance">预计距离 / 英里</label>
            <input id="distance" type="number" min="0" step="1" value="18">
          </div>
        </section>

        <section class="section">
          <h2>时间与乘客</h2>
          <div class="field">
            <label for="date">用车日期</label>
            <input id="date" type="date">
          </div>
          <div class="field">
            <label for="time">上车时间</label>
            <input id="time" type="time">
          </div>
          <div class="field">
            <label for="passengers">乘客人数</label>
            <input id="passengers" type="number" min="1" step="1" value="2">
          </div>
          <div class="field">
            <label for="luggage">行李数量</label>
            <input id="luggage" type="number" min="0" step="1" value="2">
          </div>
        </section>

        <section class="section">
          <h2>客户信息</h2>
          <div class="field">
            <label for="customer">客户姓名</label>
            <input id="customer" placeholder="客户姓名">
          </div>
          <div class="field">
            <label for="phone">联系电话</label>
            <input id="phone" placeholder="+1 000 000 0000">
          </div>
          <div class="field">
            <label for="email">邮箱</label>
            <input id="email" type="email" placeholder="name@example.com">
          </div>
        </section>

        <section class="section">
          <h2>其他要求</h2>
          <div class="field">
            <label for="extras">附加服务</label>
            <select id="extras">
              <option value="0">无</option>
              <option value="15">儿童座椅 +$15</option>
              <option value="25">举牌接机 +$25</option>
              <option value="40">多点停靠 +$40</option>
              <option value="60">夜间服务 +$60</option>
            </select>
          </div>
          <div class="field">
            <label for="notes">备注</label>
            <textarea id="notes" placeholder="航班号、特殊要求、等候说明等"></textarea>
          </div>
        </section>
      </form>
    </main>

    <aside class="sidebar">
      <h2>订单摘要</h2>
      <div class="summary">
        <div class="price">
          <div>
            <span class="badge">预估价格</span>
          </div>
          <strong id="price">$0</strong>
        </div>
        <div class="summary-row"><span>车型</span><span id="sumVehicle">经济轿车</span></div>
        <div class="summary-row"><span>服务</span><span id="sumService">机场接送</span></div>
        <div class="summary-row"><span>路线</span><span id="sumRoute">待填写</span></div>
        <div class="summary-row"><span>时间</span><span id="sumTime">待填写</span></div>
        <div class="summary-row"><span>乘客/行李</span><span id="sumPeople">2 人 / 2 件</span></div>
        <div class="actions">
          <button type="button" id="copyBtn">复制订单</button>
          <a id="whatsappBtn" class="button-link" target="_blank" rel="noreferrer">发到 WhatsApp</a>
          <button class="secondary" type="button" id="clearBtn">清空重填</button>
        </div>
        <div id="copyStatus" class="status">订单已复制</div>
      </div>
      <textarea id="orderText" class="order-text" readonly></textarea>
      <p class="notice">提示：这个版本适合马上接单。正式上线时，可以接 Stripe 收款、短信提醒、后台订单表。</p>
    </aside>
  </div>

  <script>
    const fields = {
      vehicle: () => document.querySelector("input[name='vehicle']:checked"),
      serviceType: document.getElementById("serviceType"),
      pickup: document.getElementById("pickup"),
      dropoff: document.getElementById("dropoff"),
      distance: document.getElementById("distance"),
      date: document.getElementById("date"),
      time: document.getElementById("time"),
      passengers: document.getElementById("passengers"),
      luggage: document.getElementById("luggage"),
      customer: document.getElementById("customer"),
      phone: document.getElementById("phone"),
      email: document.getElementById("email"),
      extras: document.getElementById("extras"),
      notes: document.getElementById("notes")
    };

    const output = {
      price: document.getElementById("price"),
      sumVehicle: document.getElementById("sumVehicle"),
      sumService: document.getElementById("sumService"),
      sumRoute: document.getElementById("sumRoute"),
      sumTime: document.getElementById("sumTime"),
      sumPeople: document.getElementById("sumPeople"),
      orderText: document.getElementById("orderText"),
      whatsappBtn: document.getElementById("whatsappBtn"),
      copyStatus: document.getElementById("copyStatus")
    };

    function todayIso() {
      const now = new Date();
      return now.toISOString().slice(0, 10);
    }

    function calculatePrice() {
      const vehicle = fields.vehicle();
      const base = Number(vehicle.dataset.base);
      const perMile = Number(vehicle.dataset.mile);
      const miles = Math.max(0, Number(fields.distance.value) || 0);
      const extras = Number(fields.extras.value) || 0;
      const passengerFee = Math.max(0, (Number(fields.passengers.value) || 1) - 4) * 8;
      return Math.round(base + miles * perMile + extras + passengerFee);
    }

    function val(input, fallback = "待填写") {
      return input.value.trim() || fallback;
    }

    function buildOrder() {
      const vehicle = fields.vehicle().value;
      const route = `${val(fields.pickup)} → ${val(fields.dropoff)}`;
      const dateTime = `${val(fields.date)} ${val(fields.time, "")}`.trim() || "待填写";
      const price = calculatePrice();
      const extrasText = fields.extras.options[fields.extras.selectedIndex].text;

      return {
        vehicle,
        route,
        dateTime,
        price,
        text: [
          "【新车队订单】",
          `客户：${val(fields.customer)}`,
          `电话：${val(fields.phone)}`,
          `邮箱：${val(fields.email)}`,
          `服务类型：${fields.serviceType.value}`,
          `车型：${vehicle}`,
          `路线：${route}`,
          `日期时间：${dateTime}`,
          `距离：${Number(fields.distance.value) || 0} 英里`,
          `乘客/行李：${Number(fields.passengers.value) || 1} 人 / ${Number(fields.luggage.value) || 0} 件`,
          `附加服务：${extrasText}`,
          `预估价格：$${price}`,
          `备注：${val(fields.notes, "无")}`
        ].join("\n")
      };
    }

    function render() {
      const order = buildOrder();
      output.price.textContent = `$${order.price}`;
      output.sumVehicle.textContent = order.vehicle;
      output.sumService.textContent = fields.serviceType.value;
      output.sumRoute.textContent = order.route;
      output.sumTime.textContent = order.dateTime;
      output.sumPeople.textContent = `${Number(fields.passengers.value) || 1} 人 / ${Number(fields.luggage.value) || 0} 件`;
      output.orderText.value = order.text;
      output.whatsappBtn.href = `https://wa.me/?text=${encodeURIComponent(order.text)}`;
    }

    async function copyOrder() {
      await navigator.clipboard.writeText(output.orderText.value);
      output.copyStatus.classList.add("show");
      setTimeout(() => output.copyStatus.classList.remove("show"), 1800);
    }

    function clearForm() {
      document.getElementById("orderForm").reset();
      fields.date.value = todayIso();
      render();
    }

    fields.date.value = todayIso();
    document.querySelectorAll("input, select, textarea").forEach((field) => {
      field.addEventListener("input", render);
      field.addEventListener("change", render);
    });
    document.getElementById("copyBtn").addEventListener("click", copyOrder);
    document.getElementById("clearBtn").addEventListener("click", clearForm);
    render();
  </script>
</body>
</html>
